<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=420, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f8f76">
  <title>江淮智辨 AI：面向五类人群的 AI 时代科普互动实验室</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f8f76'/%3E%3Cpath d='M18 34c6-14 22-14 28 0-6 12-22 12-28 0Z' fill='none' stroke='white' stroke-width='5'/%3E%3Ccircle cx='32' cy='34' r='7' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>

  <main id="main" class="app-shell">
    <section class="phone-frame" aria-live="polite">
      <header class="topbar">
        <button class="icon-button" type="button" id="mapButton" aria-label="返回任务地图">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6.5h16M4 12h16M4 17.5h16" />
          </svg>
        </button>
        <div>
          <p class="top-kicker">识伪实验室</p>
          <p class="top-title" id="stepTitle">准备进入</p>
          <p class="top-order" id="stepOrder">实验 00 / 04</p>
        </div>
        <div class="progress-ring" aria-label="完成度">
          <span id="progressValue">0%</span>
        </div>
      </header>

      <div class="progress-track" aria-hidden="true">
        <span id="progressBar"></span>
      </div>

      <div id="screen" class="screen"></div>
    </section>

    <aside class="side-panel" aria-label="作品状态">
      <div class="side-card">
        <p class="side-label">当前作品</p>
        <h1>江淮智辨 AI</h1>
        <p>面向五类人群，通过四个互动实验，把 AI 深度伪造、网络谣言、钓鱼信息和隐私授权风险讲清楚。</p>
      </div>
      <div class="side-card compact">
        <p class="side-label">实验进度</p>
        <ol id="sideSteps" class="side-steps"></ol>
      </div>
      <div class="side-card compact">
        <p class="side-label">行动口诀</p>
        <ul class="plain-list">
          <li>看来源</li>
          <li>找证据</li>
          <li>慢转发</li>
          <li>少授权</li>
          <li>领通行证</li>
        </ul>
      </div>
      <div class="side-card compact log-card">
        <p class="side-label">EXPERIMENT LOG</p>
        <button class="log-toggle" type="button" id="logToggle" aria-expanded="false">展开日志</button>
        <ol id="experimentLog" class="experiment-log"></ol>
      </div>
    </aside>
  </main>

  <script src="./app.js"></script>
</body>
</html>
